<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grille d'Accords — Jazz Manouche</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #ddd5c0;
            min-height: 100vh;
            color: #1a0a00;
        }

        /* Top bar */
        #topbar {
            background: #1a0a00;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        #topbar-title {
            color: #d4af37;
            font-size: 0.95em;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: normal;
        }
        .btn {
            padding: 5px 14px;
            margin-left: 8px;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.78em;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:hover { background: #d4af37; color: #1a0a00; }

        /* App layout */
        #app {
            display: flex;
            gap: 24px;
            padding: 24px;
            align-items: flex-start;
        }

        /* Palette */
        #palette {
            width: 88px;
            flex-shrink: 0;
            background: #2c1810;
            border-radius: 10px;
            padding: 14px 8px;
            position: sticky;
            top: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }
        .pal-section { margin-bottom: 16px; }
        .pal-label {
            color: #a07830;
            font-size: 0.6em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 7px;
        }
        .token {
            background: linear-gradient(180deg, #e8c040, #c89010);
            color: #1a0a00;
            padding: 8px 4px;
            margin: 4px 0;
            text-align: center;
            border-radius: 5px;
            cursor: grab;
            font-weight: bold;
            font-size: 1.05em;
            user-select: none;
            border: 1px solid #a07008;
            box-shadow: 0 2px 5px rgba(0,0,0,0.25);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .token:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .token:active { cursor: grabbing; transform: scale(0.95); }
        .token.enrich {
            background: linear-gradient(180deg, #c0a030, #906010);
            color: #fff5d0;
            font-size: 0.88em;
        }

        /* Sheet */
        #sheet {
            flex: 1;
            max-width: 820px;
        }

        /* Title */
        #title-wrap {
            text-align: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 2px solid #2c1810;
        }
        #title-input {
            font-family: 'Georgia', serif;
            font-size: 2.2em;
            font-weight: bold;
            text-align: center;
            border: none;
            background: transparent;
            color: #1a0a00;
            width: 100%;
            outline: none;
            padding: 4px 10px;
        }
        #title-input::placeholder { color: #bbb; font-style: italic; font-weight: normal; }

        /* Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 2px solid #2c1810;
            border-left: 2px solid #2c1810;
            border-radius: 2px;
            overflow: hidden;
        }

        .cell {
            background: #fefdf8;
            min-height: 90px;
            border-right: 2px solid #2c1810;
            border-bottom: 2px solid #2c1810;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.12s;
        }
        .cell:hover { background: #fdf9ea; }
        .cell.drag-over {
            background: #fffde0;
            box-shadow: inset 0 0 0 2px #d4af37;
            z-index: 1;
        }

        .bar-num {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 0.58em;
            color: #ccc;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        .chord-text {
            font-size: 1.55em;
            font-weight: bold;
            color: #1a0a00;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1;
            pointer-events: none;
        }

        .del-btn {
            position: absolute;
            top: 3px;
            right: 5px;
            font-size: 0.65em;
            color: #ddd;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.18s, color 0.18s;
            padding: 2px 3px;
            font-family: sans-serif;
            user-select: none;
        }
        .cell:hover .del-btn { opacity: 1; }
        .del-btn:hover { color: #c00; }

        /* Hint */
        #hint {
            margin-top: 10px;
            font-size: 0.7em;
            color: #999;
            font-style: italic;
            text-align: center;
        }

        /* Print */
        @media print {
            #topbar, #palette, #hint { display: none; }
            #app { padding: 10px; }
            body { background: white; }
            .del-btn { display: none; }
            .cell { background: white !important; min-height: 70px; }
            #sheet { max-width: 100%; }
            #title-input { font-size: 1.8em; }
        }

        /* PDF export */
        body.pdf-exporting #hint,
        body.pdf-exporting .del-btn { display: none !important; }
        body.pdf-exporting #sheet { background: white; }
        body.pdf-exporting .cell { background: white !important; }
        body.pdf-exporting #title-wrap { border-bottom-color: #2c1810; }
    </style>
</head>
<body>

<div id="topbar">
    <span id="topbar-title">Grille d'Accords — Jazz Manouche</span>
    <div>
        <button class="btn" onclick="clearAll()">Effacer tout</button>
        <button class="btn" onclick="exportPDF()">Exporter PDF</button>
        <button class="btn" onclick="window.print()">Imprimer</button>
    </div>
</div>

<div id="app">
    <div id="palette">
        <div class="pal-section" id="roots-section">
            <div class="pal-label">Notes</div>
        </div>
        <div class="pal-section" id="enrichments-section">
            <div class="pal-label">Enrichiss.</div>
        </div>
    </div>

    <div id="sheet">
        <div id="title-wrap">
            <input id="title-input" type="text" placeholder="Titre du morceau..." spellcheck="false" autocomplete="off" />
        </div>
        <div id="grid"></div>
        <div id="hint">Glissez-deposez les accords dans les cases &nbsp;·&nbsp; Double-clic ou ✕ pour effacer une case</div>
    </div>
</div>

<script>
const ROOTS       = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
const ENRICHMENTS = ['M7', 'm', 'm7', 'Ø', '9', '#', 'b'];
const ROWS = 8, COLS = 4, TOTAL = ROWS * COLS;

// State: one object per cell
const states = Array.from({ length: TOTAL }, () => ({ root: '', mod: '', quality: '' }));

// ----- Palette -----
function makeToken(value, type) {
    const el = document.createElement('div');
    el.className = 'token' + (type === 'enrichment' ? ' enrich' : '');
    el.textContent = value;
    el.draggable = true;
    el.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'copy';
        e.dataTransfer.setData('application/x-chord', JSON.stringify({ value, type }));
    });
    return el;
}

ROOTS.forEach(r => document.getElementById('roots-section').appendChild(makeToken(r, 'root')));
ENRICHMENTS.forEach(e => document.getElementById('enrichments-section').appendChild(makeToken(e, 'enrichment')));

// ----- Grid -----
const grid = document.getElementById('grid');

for (let i = 0; i < TOTAL; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
        <span class="bar-num">${i + 1}</span>
        <span class="chord-text"></span>
        <span class="del-btn">✕</span>
    `;

    cell.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        cell.classList.add('drag-over');
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drag-over');
        try {
            const { value, type } = JSON.parse(e.dataTransfer.getData('application/x-chord'));
            applyToCell(i, value, type);
            renderCell(i);
            save();
        } catch {}
    });
    cell.addEventListener('dblclick', () => { clearCell(i); save(); });
    cell.querySelector('.del-btn').addEventListener('click', e => {
        e.stopPropagation();
        clearCell(i);
        save();
    });

    grid.appendChild(cell);
}

// ----- Logic -----
function applyToCell(i, value, type) {
    const s = states[i];
    if (type === 'root') {
        // New root: reset modifier, keep quality so the user can swap roots cleanly
        s.root = value;
        s.mod = '';
    } else if (value === '#' || value === 'b') {
        // Toggle accidental
        s.mod = (s.mod === value) ? '' : value;
    } else {
        // Toggle quality enrichment
        s.quality = (s.quality === value) ? '' : value;
    }
}

function renderCell(i) {
    const s = states[i];
    const text = s.root + s.mod + s.quality;
    grid.children[i].querySelector('.chord-text').textContent = text;
}

function clearCell(i) {
    const s = states[i];
    s.root = ''; s.mod = ''; s.quality = '';
    renderCell(i);
}

function clearAll() {
    if (!confirm('Effacer toute la grille ?')) return;
    states.forEach((_, i) => clearCell(i));
    save();
}

function exportPDF() {
    const title = document.getElementById('title-input').value.trim() || 'grille-accords';
    document.body.classList.add('pdf-exporting');

    html2pdf()
        .set({
            margin: [12, 12, 12, 12],
            filename: title + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        })
        .from(document.getElementById('sheet'))
        .save()
        .then(() => document.body.classList.remove('pdf-exporting'));
}

// ----- Persistence (localStorage) -----
function save() {
    localStorage.setItem('jazz-grid', JSON.stringify({
        title: document.getElementById('title-input').value,
        cells: states
    }));
}

function load() {
    try {
        const data = JSON.parse(localStorage.getItem('jazz-grid'));
        if (!data) return;
        document.getElementById('title-input').value = data.title || '';
        (data.cells || []).forEach((s, i) => {
            if (s && i < TOTAL) {
                states[i].root    = s.root    || '';
                states[i].mod     = s.mod     || '';
                states[i].quality = s.quality || '';
                renderCell(i);
            }
        });
    } catch {}
}

document.getElementById('title-input').addEventListener('input', save);

load();
</script>

</body>
</html>
